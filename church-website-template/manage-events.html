<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Events | Victory Baptist Bible Church</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="admin.html" class="logo">Admin Dashboard</a>
      <ul class="nav-links">
        <li><a href="admin.html">Admin Home</a></li>
        <li><a href="index.html">View Website</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <p class="section-label">Admin</p>
      <h1>Manage Events</h1>
      <p>Add, edit, or remove church events.</p>

      <form id="eventForm" class="contact-form admin-form">
        <input type="hidden" id="eventId" />

        <label>
          Start Date
          <input type="date" id="eventSortDate" required />
        </label>
        
        <label>
          End Date
          <input type="date" id="eventEndDate" />
        </label>

        <label>
          Repeat
          <select id="recurrenceType">
            <option value="">Does not repeat</option>
            <option value="weekly_in_range">Every selected weekday between Start Date and End Date</option>
          </select>
        </label>
        
        <label>
          Repeat Weekday
          <select id="recurrenceWeekday">
            <option value="">Select weekday</option>
            <option value="0">Sunday</option>
            <option value="1">Monday</option>
            <option value="2">Tuesday</option>
            <option value="3">Wednesday</option>
            <option value="4">Thursday</option>
            <option value="5">Friday</option>
            <option value="6">Saturday</option>
          </select>
        </label>        

        <label>
          Event Time
          <input type="time" id="eventTime" required />
        </label>
        <label>
          
          Event Title
          <input type="text" id="eventTitle" placeholder="EVENT TITLE" required />
        </label>

        <label>
          Event Description
          <textarea id="eventDescription" rows="4" placeholder="EVENT DESCRIPTION." required></textarea>
        </label>
        <label>
          Event Picture
          <input type="file" id="eventImage" name="event_image" accept="image/*" />
        </label>
        <button class="btn primary" type="submit">Save Event</button>
        <button class="btn admin-cancel" type="button" id="cancelEdit">Cancel Edit</button>
      </form>

      <div class="admin-list">
        <h2>Current Events</h2>
        <div id="eventsAdminList" class="event-list"></div>
      </div>
    </section>
  </main>

  <div id="imageLightbox" class="lightbox" onclick="closeImage()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImage" class="lightbox-image" src="" alt="Event Image">
  </div>
  <script src="script.js"></script>
  <script src="manage-events.js"></script>
</body>
</html>
